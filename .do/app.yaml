# DigitalOcean App Platform spec for Photo Studio.
# Apply: console → app → Settings → "App Spec" → Edit/paste, OR
#        doctl apps update <APP_ID> --spec .do/app.yaml
# Create: doctl apps create --spec .do/app.yaml
#
# Before applying, replace the two REPLACE_ME secrets and the domain below.

name: photo-studio
region: nyc                          # change to your region (e.g. sfo3, fra1, ams3)

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: ivjames/photo-studio
      branch: main
      deploy_on_push: true

    # App Platform injects PORT = http_port and routes TLS-terminated traffic here.
    # The Dockerfile binds 0.0.0.0:$PORT, so this just needs to match.
    http_port: 8080

    # Keep at 1. State is an in-memory STATE dict + on-disk /data; it is NOT
    # shared across instances, and gunicorn runs -w 1 by design. Scaling
    # horizontally would give each instance a divergent session.
    instance_count: 1

    # 512 MB (basic-xxs) is tight for OpenCV processing full-page scans.
    # Confirm/adjust in the console — slug names change over time.
    instance_size_slug: basic-xs     # 1 vCPU / 1 GB

    health_check:
      http_path: /
      initial_delay_seconds: 20

    envs:
      # --- Auth (REQUIRED on a public URL; without it the app is open) ---
      - key: PHOTOSTUDIO_USER
        scope: RUN_TIME
        value: admin
      - key: PHOTOSTUDIO_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: jimo           # set a long random password

      # --- Vision tagging via Ollama over Tailscale ---
      - key: PHOTOSTUDIO_TAGGER
        scope: RUN_TIME
        value: ollama
      - key: OLLAMA_URL
        scope: RUN_TIME
        value: http://100.x.y.z:11434   # Tailscale IP of the Ollama host (MagicDNS name also works)
      - key: OLLAMA_MODEL
        scope: RUN_TIME
        value: llama3.2-vision          # a vision model you've `ollama pull`ed (e.g. llava, qwen2.5vl, gemma3)

      # Auth key that joins this container to your tailnet. Use a REUSABLE +
      # EPHEMERAL key, tagged (e.g. tag:appplatform) and ACL-locked to the
      # Ollama node:11434. Generate at Tailscale admin → Settings → Keys.
      - key: TS_AUTHKEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME               # tskey-auth-...

      # Route the app's outbound Ollama call through tailscaled's userspace proxy.
      - key: http_proxy
        scope: RUN_TIME
        value: http://localhost:1055
      - key: https_proxy
        scope: RUN_TIME
        value: http://localhost:1055
      - key: no_proxy
        scope: RUN_TIME
        value: localhost,127.0.0.1

      # Data dir. NOTE: App Platform's filesystem is EPHEMERAL — anything under
      # /data is wiped on every deploy/restart. Treat sessions as disposable;
      # have users download finished photos.
      - key: PHOTOSTUDIO_HOME
        scope: RUN_TIME
        value: /data

domains:
  - domain: photos.lab980.com       # replace with your subdomain
    type: PRIMARY
    zone: lab980.com                # the parent zone hosted in DO DNS
